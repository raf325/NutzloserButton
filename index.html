<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinnlos-Overload</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; /* Verhindert Scrollbalken beim Spam */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #oracle-button {
            padding: 25px 50px;
            font-size: 1.8rem;
            cursor: pointer;
            border: 4px solid white;
            background: #ff0055;
            color: white;
            font-weight: bold;
            position: absolute; /* Wichtig für die Bewegung */
            z-index: 10; /* Niedriger als der Spam */
            transition: all 0.1s ease;
            box-shadow: 0 0 20px #ff0055;
        }

        /* Die Stil-Klasse für den Text-Spam */
        .spam-text {
            position: absolute;
            pointer-events: none; /* Man kann durch den Text durchklicken */
            z-index: 99; /* Immer über dem Button */
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            user-select: none;
        }

        .glitch { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(2px, -1px); }
        }
    </style>
</head>
<body>

    <button id="oracle-button">NICHT DRÜCKEN!</button>

    <script>
        const button = document.getElementById('oracle-button');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const messages = ["ERROR", "WARUM?", "HILFE", "NEIN", "STOPP", "LOL", "GIB AUF", "KRASS", "ZACK", "BOOM"];
        const colors = ["#00FF00", "#FF00FF", "#FFFF00", "#00FFFF", "#FF4500", "#ADFF2F"];

        function playBeep(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'sawtooth'; 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function createSpam() {
            const span = document.createElement('span');
            span.className = 'spam-text';
            span.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            // Zufällige Position
            span.style.left = Math.random() * 90 + "vw";
            span.style.top = Math.random() * 90 + "vh";
            
            // Zufälliges Design
            span.style.color = colors[Math.floor(Math.random() * colors.length)];
            span.style.fontSize = (Math.random() * 4 + 1) + "rem";
            span.style.transform = `rotate(${Math.random() * 360}deg)`;
            
            // 50% Chance auf Glitch-Animation
            if(Math.random() > 0.5) span.classList.add('glitch');

            document.body.appendChild(span);
        }

        function moveButton() {
            const x = Math.random() * (window.innerWidth - button.offsetWidth);
            const y = Math.random() * (window.innerHeight - button.offsetHeight);
            button.style.left = x + 'px';
            button.style.top = y + 'px';
        }

        // Button flüchtet beim Drüberfahren
        button.addEventListener('mouseover', () => {
            moveButton();
            playBeep(200, 0.05);
        });

        // Button-Klick Aktion
        button.addEventListener('click', () => {
            // Jedes Mal 5 neue Texte erzeugen
            for(let i=0; i<5; i++) {
                createSpam();
            }
            
            moveButton();
            playBeep(440, 0.1);
            
            // Hintergrund kurz aufblitzen lassen
            document.body.style.backgroundColor = "white";
            setTimeout(() => { document.body.style.backgroundColor = "black"; }, 50);
        });
    </script>
</body>
</html>
