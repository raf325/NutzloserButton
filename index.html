<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIE NUTZLOSE SEITE 2.0</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', cursive; /* Extra nervig */
            transition: background-color 0.1s;
            overflow: hidden;
            text-align: center;
        }

        h1 { font-size: 3rem; color: white; text-shadow: 4px 4px 0px #000; }

        #oracle-button {
            padding: 20px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            border: 5px solid black;
            background: yellow;
            font-weight: bold;
            position: relative;
            z-index: 100;
        }

        #result {
            margin-top: 30px;
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 10px black;
        }

        /* Animation für den Glitch-Effekt */
        .glitch {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body style="background-color: #ff00ff;">

    <h1>Orakel der Zerstörung</h1>
    
    <button id="oracle-button">KLICK MICH (FALLS DU KANNST)</button>
    
    <p id="result"></p>

    <script>
        const button = document.getElementById('oracle-button');
        const resultText = document.getElementById('result');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const answers = ["JA!", "NEIN!", "STIRB AN GLITZER!", "WAS?!", "LOL NEIN.", "OBAMA?", "HUSTENSAFT.", "404 HILFE!"];

        // Funktion für synthetischen Beep-Sound
        function playBeep(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'square'; 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 1. Der flüchtende Button (Zufallschance)
        button.addEventListener('mouseover', () => {
            if (Math.random() < 0.3) { // 30% Chance, dass er wegrennt
                const x = Math.random() * (window.innerWidth - button.offsetWidth);
                const y = Math.random() * (window.innerHeight - button.offsetHeight);
                button.style.position = 'absolute';
                button.style.left = x + 'px';
                button.style.top = y + 'px';
                playBeep(150, 0.1);
            }
        });

        // 2. Der Klick-Wahnsinn
        button.addEventListener('click', () => {
            const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
            resultText.innerText = randomAnswer;

            // Krasser Glitch-Effekt für den Text
            resultText.classList.add('glitch');
            setTimeout(() => resultText.classList.remove('glitch'), 500);

            // Hintergrund-Farben-Gewitter
            document.body.style.backgroundColor = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;

            // Sound-Feedback
            if (randomAnswer === "JA!") {
                playBeep(880, 0.5); // Hoher Ton
                playBeep(1100, 0.5);
            } else {
                playBeep(200, 0.2); // Tiefer Ton
            }
            
            // Button an neue Position schießen nach Klick
            const x = Math.random() * (window.innerWidth - button.offsetWidth);
            const y = Math.random() * (window.innerHeight - button.offsetHeight);
            button.style.position = 'absolute';
            button.style.left = x + 'px';
            button.style.top = y + 'px';
        });
    </script>
</body>
</html>
