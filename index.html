<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Hub 2026</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: background-color 0.1s;
        }

        /* --- MENU STYLES --- */
        #menu {
            text-align: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-title {
            font-size: 4rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #00FF00;
            text-shadow: 5px 5px 0px #ff0055;
        }

        .menu-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: transparent;
            color: white;
            border: 3px solid white;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: white;
            color: black;
            transform: scale(1.05);
        }

        /* --- GAME CONTAINERS --- */
        .game-container {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Spiel 1: Chaos Button */
        #oracle-button {
            padding: 25px 50px;
            font-size: 1.8rem;
            cursor: pointer;
            border: 4px solid white;
            background: #ff0055;
            color: white;
            font-weight: bold;
            position: absolute;
            z-index: 10;
            transition: all 0.1s ease;
            box-shadow: 0 0 20px #ff0055;
        }

        .spam-text {
            position: absolute;
            pointer-events: none;
            z-index: 99;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            user-select: none;
        }

        /* Spiel 2 & 3: Effekte */
        .art-circle, .paint-splat {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .art-circle {
            border: 2px solid white;
            animation: explode 2s forwards;
        }

        @keyframes explode {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Spiel 3: Mal-Menü */
        #paint-controls {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border: 2px solid #fff;
            z-index: 3000;
        }

        .color-pick {
            width: 30px;
            height: 30px;
            border: 2px solid white;
            cursor: pointer;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 4000;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            cursor: pointer;
        }

        .glitch { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(2px, -1px); }
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1 class="menu-title">Chaos Hub</h1>
        <button class="menu-btn" onclick="showGame('chaos')">▶ Spiel 1: Chaos Button</button>
        <button class="menu-btn" onclick="showGame('art')">▶ Spiel 2: Neon Kunst</button>
        <button class="menu-btn" onclick="showGame('paint')">▶ Spiel 3: Pixel-Gekritzel</button>
        <p style="margin-top: 20px; font-family: sans-serif; color: #666; font-size: 0.9rem;">Kann Spuren von Pixel-Müll enthalten</p>
    </div>

    <button id="back-to-menu" class="back-btn" style="display:none;" onclick="location.reload()">↩ ZURÜCK</button>

    <div id="game-chaos" class="game-container">
        <button id="oracle-button">NICHT DRÜCKEN!</button>
    </div>

    <div id="game-art" class="game-container" onmousemove="drawArt(event)">
        <h2 style="text-align: center; color: #333; margin-top: 50px;">Bewege die Maus</h2>
    </div>

    <div id="game-paint" class="game-container" onmousemove="paint(event)">
        <div id="paint-controls">
            <div class="color-pick" style="background: #00FF00;" onclick="currentColor='#00FF00'"></div>
            <div class="color-pick" style="background: #FF00FF;" onclick="currentColor='#FF00FF'"></div>
            <div class="color-pick" style="background: #FFFF00;" onclick="currentColor='#FFFF00'"></div>
            <div class="color-pick" style="background: #00FFFF;" onclick="currentColor='#00FFFF'"></div>
            <div class="color-pick" style="background: #ffffff;" onclick="currentColor='#ffffff'"></div>
            <button onclick="gravityGlitch()" style="margin-top:10px; font-size: 0.7rem; cursor:pointer;">GRAVITY GLITCH</button>
        </div>
        <h2 style="text-align: center; color: #333; margin-top: 50px;">Male dein Meisterwerk</h2>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const colors = ["#00FF00", "#FF00FF", "#FFFF00", "#00FFFF", "#FF4500", "#ADFF2F"];
        const messages = ["ERROR", "WARUM?", "HILFE", "NEIN", "STOPP", "LOL", "GIB AUF", "KRASS", "ZACK", "BOOM"];
        let currentColor = "#00FF00";

        function showGame(type) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('back-to-menu').style.display = 'block';
            document.body.style.backgroundColor = '#000';
            document.querySelectorAll('.game-container').forEach(c => c.style.display = 'none');
            document.getElementById('game-' + type).style.display = 'block';
            playBeep(600, 0.1);
        }

        function playBeep(freq, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'sawtooth'; 
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- SPIEL 1 LOGIK ---
        const btnChaos = document.getElementById('oracle-button');
        btnChaos.addEventListener('mouseover', () => { moveElement(btnChaos); playBeep(200, 0.05); });
        btnChaos.addEventListener('click', () => { for(let i=0; i<5; i++) createSpam(); moveElement(btnChaos); playBeep(440, 0.1); });

        function moveElement(el) {
            const x = Math.random() * (window.innerWidth - el.offsetWidth);
            const y = Math.random() * (window.innerHeight - el.offsetHeight);
            el.style.left = x + 'px'; el.style.top = y + 'px';
        }

        function createSpam() {
            const span = document.createElement('span');
            span.className = 'spam-text';
            span.innerText = messages[Math.floor(Math.random() * messages.length)];
            span.style.left = Math.random() * 80 + "vw";
            span.style.top = Math.random() * 80 + "vh";
            span.style.color = colors[Math.floor(Math.random() * colors.length)];
            span.style.fontSize = (Math.random() * 4 + 1) + "rem";
            span.style.transform = `rotate(${Math.random() * 360}deg)`;
            if(Math.random() > 0.5) span.classList.add('glitch');
            document.getElementById('game-chaos').appendChild(span);
        }

        // --- SPIEL 2 LOGIK ---
        function drawArt(e) {
            const x = e.clientX; const y = e.clientY;
            const circle = document.createElement('div');
            circle.className = 'art-circle';
            const size = Math.random() * 50 + 10;
            circle.style.width = size + 'px'; circle.style.height = size + 'px';
            circle.style.left = x - size/2 + 'px'; circle.style.top = y - size/2 + 'px';
            circle.style.borderColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('game-art').appendChild(circle);
            setTimeout(() => circle.remove(), 2000);
        }

        // --- SPIEL 3 LOGIK ---
        function paint(e) {
            if(e.buttons !== 1) return; // Nur malen wenn Maustaste gedrückt
            const x = e.clientX; const y = e.clientY;
            const splat = document.createElement('div');
            splat.className = 'paint-splat';
            // Größe basierend auf Geschwindigkeit (simuliert)
            const size = Math.abs(e.movementX + e.movementY) + 5;
            splat.style.width = size + 'px';
            splat.style.height = size + 'px';
            splat.style.left = x - size/2 + 'px';
            splat.style.top = y - size/2 + 'px';
            splat.style.backgroundColor = currentColor;
            splat.style.boxShadow = `0 0 10px ${currentColor}`;
            document.getElementById('game-paint').appendChild(splat);
        }

        function gravityGlitch() {
            playBeep(100, 0.5);
            const splats = document.querySelectorAll('.paint-splat');
            splats.forEach(s => {
                s.style.transition = "all 2s ease-in";
                s.style.top = "120vh";
                s.style.transform = `rotate(${Math.random()*360}deg)`;
                setTimeout(() => s.remove(), 2000);
            });
        }
    </script>
</body>
</html>
